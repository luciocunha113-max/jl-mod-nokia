name: Build APK Nokia
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
      - name: Clone JL-Mod
        run: git clone --recurse-submodules https://github.com/woesss/JL-Mod.git
      - name: Black toolbar
        run: |
          sed -i 's/#262e37/#000000/g' JL-Mod/app/src/main/res/values-night/colors.xml
          sed -i 's/#20272f/#000000/g' JL-Mod/app/src/main/res/values-night/colors.xml
      - name: Red icon from J2ME Loader
        run: |
          pip install Pillow numpy -q
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            wget -q "https://raw.githubusercontent.com/nikita36078/J2ME-Loader/master/app/src/main/res/mipmap-${density}/ic_launcher.png" -O /tmp/icon_${density}.png
          done
          python3 << 'PYEOF'
          from PIL import Image
          import numpy as np
          import os

          densities = ['mdpi', 'hdpi', 'xhdpi', 'xxhdpi', 'xxxhdpi']
          for density in densities:
              src = f'/tmp/icon_{density}.png'
              dst = f'JL-Mod/app/src/main/res/mipmap-{density}/ic_launcher.png'
              if not os.path.exists(src):
                  continue
              img = Image.open(src).convert('RGBA')
              data = np.array(img, dtype=float)
              # Shift hue: swap R and B channels to turn blue→red
              r = data[:,:,0].copy()
              data[:,:,0] = data[:,:,2]  # R = B
              data[:,:,2] = r            # B = R
              result = Image.fromarray(data.astype(np.uint8))
              result.save(dst)
              print(f'Done: {density}')
          PYEOF
      - name: Create keystore
        working-directory: JL-Mod
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
          printf 'keyAlias=androiddebugkey\nkeyPassword=android\nstoreFile=debug.keystore\nstorePassword=android\n' > keystore.properties
      - name: Build
        working-directory: JL-Mod
        run: chmod +x gradlew && ./gradlew assembleEmulatorDebug
      - uses: actions/upload-artifact@v4
        with:
          name: apk-nokia
          path: JL-Mod/app/build/outputs/apk/**/**.apk
