name: Build APK Nokia
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
      - name: Clone JL-Mod
        run: git clone --recurse-submodules https://github.com/woesss/JL-Mod.git
      - name: Apply Nokia theme
        working-directory: JL-Mod/app/src/main/res/values
        run: |
          sed -i 's/#212121/#000000/g' colors.xml
          sed -i 's/#1c1c1c/#000000/g' colors.xml
          sed -i 's/#ff2e51/#4CAF50/g' colors.xml
          sed -i 's/#fafafa/#111111/g' colors.xml
          sed -i 's/#ffffff/#1A1A1A/g' colors.xml
          sed -i 's/Theme.AppCompat.DayNight.DarkActionBar/Theme.AppCompat/g' styles.xml
      - name: Create keystore
        working-directory: JL-Mod
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
          printf 'keyAlias=androiddebugkey\nkeyPassword=android\nstoreFile=debug.keystore\nstorePassword=android\n' > keystore.properties
      - name: Build
        working-directory: JL-Mod
        run: chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: apk-nokia
          path: JL-Mod/app/build/outputs/apk/debug/app-debug.apk
